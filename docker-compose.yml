# docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: quotation-config-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quotation_config
    ports:
      - "5432:5432"
    volumes:
      - quotation_config_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d quotation_config"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quotation_config_pgdata:
